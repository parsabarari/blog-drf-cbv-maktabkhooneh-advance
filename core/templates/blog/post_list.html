<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>
        <h2></h2>
    </div>
    <div>
        <h1>Articles</h1>
        <h1>{{name}}</h1>
        <ul>
            {% for article in object_list %}
            <h2><li>{{ article.published_date|date }} - {{ article.title }} - {{ article.author.first_name }}</li></h2>
            {% empty %}
            <li>No articles yet.</li>
            {% endfor %}
        </ul>
    </div>
</body>

</html>
